version: "2"

sql:
  - schema: "../internal/constant/query/schemas"
    queries: "../internal/constant/query/queries"
    engine: "postgresql"
    
    gen:
      go:
        package: "db"
        out: "../internal/constant/model/db"
        sql_package: "pgx/v4"  # Updated to v5
        emit_json_tags: true    # Recommended for API responses
        emit_interface: true    # Generates Querier interface for testing/mocking
        emit_empty_slices: true # Returns empty slices instead of nil
        emit_pointers_for_null_types: true  # Better null handling with pgx
        
        overrides:
          # For nullable numeric columns -> returns *decimal.Decimal or null
          - db_type: "pg_catalog.numeric"
            go_type: "github.com/shopspring/decimal.Decimal"
            nullable: true
          
          # For non-nullable numeric columns -> returns decimal.Decimal
          - db_type: "pg_catalog.numeric"
            go_type: "github.com/shopspring/decimal.Decimal"
            nullable: false